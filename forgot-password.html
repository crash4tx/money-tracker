<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password | Luxentra Finance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-[#f7f7f8] relative overflow-x-hidden overflow-y-auto" data-page="forgot-password">
    <!-- Background Bubbles -->
    <div class="fixed top-[-14vw] left-[-10vw] w-[42vw] h-[42vw] min-w-[380px] min-h-[380px] rounded-full bg-lux-blue-500 opacity-80 pointer-events-none z-0"></div>
    <div class="fixed right-[-12vw] bottom-[-12vw] w-[42vw] h-[42vw] min-w-[380px] min-h-[380px] rounded-full bg-lux-blue-500 opacity-80 pointer-events-none z-0"></div>

    <main class="relative z-10 grid place-items-center min-h-screen p-4 sm:p-6">
      <section class="relative w-full max-w-[860px] rounded-[48px] bg-white shadow-lux">
        <div class="w-[calc(100%-64px)] max-w-[560px] mx-auto -mt-6 sm:-mt-[22px] px-7 py-5 sm:py-[22px] rounded-3xl bg-gradient-to-r from-lux-blue-500 to-lux-blue-700 text-white text-center font-title text-[clamp(1.8rem,5vw,3rem)] font-extrabold tracking-tight">LUPA PASSWORD</div>
        <div class="p-6 sm:p-8">
          <h1 class="text-lux-text font-title text-[clamp(2rem,4vw,3.6rem)] font-black leading-[1.04] tracking-tight">Anda Lupa Password?</h1>
          <p class="mt-3.5 mb-6 text-lux-text-muted text-[1.05rem] leading-relaxed">
            Masukan email akun anda. Kami akan mengirimkan kode verifikasi untuk
            meriset password anda.
          </p>

          <form class="auth-form grid gap-[22px]">
            <label class="grid gap-3">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Email</span>
              <div class="input-shell w-full border-0 rounded-[22px] bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-2xl opacity-60">✉</span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full placeholder:text-[#8992a3]" type="email" placeholder="Masukan Email" />
              </div>
            </label>

            <button class="button button--primary w-full inline-flex items-center justify-center gap-2.5 border-0 rounded-full py-3.5 px-6 font-extrabold text-white bg-[#0062ff] shadow-[0_18px_35px_rgba(0,98,255,0.24)] transition-all duration-180 ease-in-out hover:-translate-y-0.5 hover:shadow-[0_18px_35px_rgba(0,98,255,0.35)] active:translate-y-0 cursor-pointer mt-2" type="submit">
              Verifikasi Email Anda
            </button>
          </form>

          <p class="mt-[18px] text-center text-lux-text text-[1.1rem]">
            <a class="font-black text-lux-blue-500 hover:underline" href="login.html">Kembali Ke Login</a>
          </p>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
