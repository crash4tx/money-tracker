<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profil | Luxentra Finance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-page" data-page="edit-profile">
    <div class="app-shell">
      <!-- Sidebar / Bottom Nav -->
      <aside class="sidebar">
        <a class="brand" href="dashboard.html">
          <img src="assets/logo-mark.svg" alt="" />
          <span>
            <strong>Luxentra Finance</strong>
            <small>Pengguna</small>
          </span>
        </a>

        <nav class="sidebar-nav">
          <a class="sidebar-link" href="dashboard.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span>Dashboard</span></a>
          <a class="sidebar-link" href="transactions.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3l4 4-4 4"></path><path d="M20 7H4"></path><path d="M8 21l-4-4 4-4"></path><path d="M4 17h16"></path></svg><span>Transaksi</span></a>
          <a class="sidebar-link" href="new-transaction.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></svg><span>Tambah Transaksi</span></a>
          <a class="sidebar-link is-active" href="settings.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1.07 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg><span>Pengaturan</span></a>
        </nav>

        <a class="sidebar-exit" href="index.html">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span>Keluar</span>
        </a>
      </aside>

      <!-- Main Content -->
      <main class="app-main flex-1 p-6 md:p-10 pb-[120px] md:pb-10 max-w-[1360px] mx-auto w-full">
        <header class="app-header mb-6 sm:mb-9 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
          <div>
            <h1 class="text-lux-text font-title text-[clamp(1.8rem,4vw,3.2rem)] font-extrabold leading-[1.1] tracking-tight">Edit Profil</h1>
            <p class="text-lux-text-muted text-[1.05rem] mt-1">Perbarui informasi akun dan keamanan Anda</p>
          </div>
          <a href="settings.html" class="button button--ghost inline-flex items-center justify-center gap-2 border-2 border-lux-text/12 rounded-full py-3.5 px-6 font-extrabold text-lux-text bg-transparent transition-all duration-180 ease-in-out hover:-translate-y-0.5 active:translate-y-0 cursor-pointer self-stretch md:self-auto text-center">
            <svg class="mr-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Kembali
          </a>
        </header>

        <section class="panel">
          <h2>Update Data Diri</h2>
          <p>Pastikan data Anda selalu terbaru</p>

          <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <label class="grid gap-3">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Nama Lengkap</span>
              <div class="input-shell w-full border-0 rounded-full bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-lux-text-muted"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full" id="editNameInput" type="text" value="" placeholder="Memuat nama..." />
              </div>
            </label>
 
            <label class="grid gap-3">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Email</span>
              <div class="input-shell w-full border-0 rounded-full bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-lux-text-muted"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full" id="editEmailInput" type="email" value="" placeholder="Memuat email..." />
              </div>
            </label>

            <label class="md:col-span-2 grid gap-3">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Nomor Telepon (Opsional)</span>
              <div class="input-shell w-full border-0 rounded-full bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-lux-text-muted"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full placeholder:text-[#8992a3]" id="editPhoneInput" type="text" placeholder="Masukkan Nomor Telepon" />
                <button type="button" id="verifyPhoneBtn" class="button button--primary inline-flex items-center justify-center border-0 rounded-full py-2 px-4 font-extrabold text-white bg-[#0062ff] shadow-[0_18px_35px_rgba(0,98,255,0.24)] hover:-translate-y-0.5 active:translate-y-0 cursor-pointer text-xs transition-all whitespace-nowrap -mr-3 ml-3" style="display: none;">Verifikasi</button>
              </div>
            </label>

            <label id="otpContainer" class="md:col-span-2 grid gap-3" style="display: none; margin-top: -8px;">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Masukkan Kode OTP</span>
              <div class="input-shell w-full border-0 rounded-full bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-lux-text-muted"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full placeholder:text-[#8992a3]" id="otpInput" type="text" placeholder="Masukkan 6 digit kode OTP" />
                <button type="button" id="confirmOtpBtn" class="button button--primary inline-flex items-center justify-center border-0 rounded-full py-2 px-4 font-extrabold text-white bg-[#0062ff] shadow-[0_18px_35px_rgba(0,98,255,0.24)] hover:-translate-y-0.5 active:translate-y-0 cursor-pointer text-xs transition-all whitespace-nowrap -mr-3 ml-3">Konfirmasi</button>
              </div>
            </label>
          </form>
        </section>

        <section class="panel">
          <h2>Ubah Password</h2>
          <p>Ubah password lama Anda untuk menjaga keamanan akun</p>

          <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <label class="md:col-span-2 grid gap-3">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Password Lama</span>
              <div class="input-shell w-full border-0 rounded-full bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-lux-text-muted"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full placeholder:text-[#8992a3]" type="password" placeholder="Masukan Password Lama Anda" />
                <button type="button" class="password-toggle bg-none border-none p-0 cursor-pointer text-[#94a3b8] flex items-center justify-center transition-colors duration-200 hover:text-lux-text" tabindex="-1">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </div>
            </label>

            <label class="grid gap-3">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Password Baru</span>
              <div class="input-shell w-full border-0 rounded-full bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-lux-text-muted"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full placeholder:text-[#8992a3]" type="password" placeholder="Minimal 8 Karakter" />
                <button type="button" class="password-toggle bg-none border-none p-0 cursor-pointer text-[#94a3b8] flex items-center justify-center transition-colors duration-200 hover:text-lux-text" tabindex="-1">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </div>
            </label>

            <label class="grid gap-3">
              <span class="text-[1.4rem] font-extrabold text-lux-text">Konfirmasi Password Baru</span>
              <div class="input-shell w-full border-0 rounded-full bg-[#eef0f4] shadow-[inset_0_-2px_0_rgba(15,23,42,0.04),_0_10px_18px_rgba(15,23,42,0.08)] grid grid-cols-[auto_1fr_auto] items-center gap-3.5 px-[22px] py-[18px] transition-all duration-200 ease-in-out">
                <span class="input-icon text-lux-text-muted"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                <input class="border-0 bg-transparent text-lux-text outline-none w-full placeholder:text-[#8992a3]" type="password" placeholder="Ketik Ulang Password Baru" />
                <button type="button" class="password-toggle bg-none border-none p-0 cursor-pointer text-[#94a3b8] flex items-center justify-center transition-colors duration-200 hover:text-lux-text" tabindex="-1">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </div>
            </label>
            
            <div class="form-actions md:col-span-2 flex flex-col md:flex-row gap-4 justify-end mt-3">
              <button type="button" id="saveProfileChanges" class="button button--primary inline-flex items-center justify-center gap-2.5 border-0 rounded-full py-3.5 px-8 font-extrabold text-white bg-[#0062ff] shadow-[0_18px_35px_rgba(0,98,255,0.24)] transition-all duration-180 ease-in-out hover:-translate-y-0.5 active:translate-y-0 cursor-pointer text-[1.1rem]">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                Simpan Perubahan
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
