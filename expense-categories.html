<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Kategori Pengeluaran | Luxentra Finance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-page" data-page="expense-categories">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand brand--dark" href="dashboard.html">
          <img src="assets/logo-mark.svg" alt="" />
          <span>
            <strong>Luxentra Finance</strong>
            <small>Pengguna</small>
          </span>
        </a>

        <nav class="sidebar-nav">
          <a class="sidebar-link is-active" href="dashboard.html">Dashboard</a>
          <a class="sidebar-link" href="transactions.html">Transaksi</a>
          <a class="sidebar-link" href="new-transaction.html">Tambah Transaksi</a>
          <a class="sidebar-link" href="settings.html">Pengaturan</a>
        </nav>

        <a class="sidebar-exit" href="index.html">Keluar</a>
      </aside>

      <main class="app-main">
        <header class="app-header app-header--detail">
          <a class="back-link" href="dashboard.html">&larr; Kembali</a>
          <div>
            <h1>Detail Kategori Pengeluaran</h1>
            <p>Distribusi pengeluaran berdasarkan kategori</p>
          </div>
        </header>

        <section class="expense-detail-grid">
          <article class="panel expense-detail-card">
            <h2>Kategori Pengeluaran</h2>
            <p>Distribusi Pengeluaran Berdasarkan Kategori</p>
            <div class="expense-detail-chart-wrap">
              <div class="chart chart--donut chart--donut-large" id="expenseDetailChart"></div>
            </div>
            <div class="expense-summary">
              <span class="expense-summary__month" id="expenseDetailMonth">Maret 2026</span>
              <div>
                <span class="expense-summary__label">Total Pengeluaran</span>
                <strong class="expense-summary__total" id="expenseDetailTotal">Rp 10.000.000</strong>
              </div>
            </div>
          </article>

          <article class="panel expense-detail-card">
            <div class="expense-category-list" id="expenseCategoryList"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
